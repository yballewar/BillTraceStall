<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BillTrace</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="shell">
        <main class="card" aria-labelledby="login-title">
            <div class="hero">
                <img class="heroImg" src="public/kettle.png" alt="Kettle">
            </div>

            <div class="formBlock">
                <h1 id="login-title" class="title">Login</h1>
                <p class="sub">
                    Don't have an account?
                    <a class="link" href="signup.html">Signup</a>
                </p>

                <!-- Social Login Images -->
                <div class="social-row">
                    <img src="public/1-Photoroom.png" alt="Tea" class="social-icon">
                    <img src="public/2-Photoroom (2).png" alt="Delivery" class="social-icon">
                    <img src="public/3-Photoroom.png" alt="Office" class="social-icon">
                </div>

                <form id="loginForm" novalidate>
                    <!-- Contact Number -->
                    <div class="wrap">
                        <label class="label" for="contact">Contact number</label>
                        <input id="contact" name="contact" type="tel" class="input" placeholder="1234567890"
                            autocomplete="tel">
                    </div>

                    <!-- OTP -->
                    <div class="wrap">
                        <label class="label" for="otp">OTP</label>
                        <input id="otp" name="otp" type="password" class="input" placeholder="••••••"
                            autocomplete="one-time-code">
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn brown login-button">Login</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            // Redirect to signup page
            window.location.href = 'signup.html';
        });
    </script>
</body>

</html>
